<style>
:root {

body {

.login-page {
  display:grid;
  grid-template-columns:1fr 1fr;
  height:100vh;
}

.login-photo {

  linear-gradient(to top, rgba(63,74,45,.85), rgba(63,74,45,.15)),

.login-panel {
  display:flex;

</head>

<body>

<!-- LOGIN -->

<div id="loginPage" class="login-page">

  <div class="login-photo"></div>

  <div class="login-panel">
    <div class="login-card">

  <h2>Bem-vindos</h2>

  <div style="display:flex;gap:10px;">
    <button id="btnLua" class="user-btn active" onclick="setUser('Luã')">Luã</button>
    <button id="btnMayara" class="user-btn" onclick="setUser('Mayara')">Mayara</button>

  </div>

</div>

<!-- APP -->

<div id="app" class="app">

  <h1>Controle Financeiro 💰</h1>

  <input id="desc" placeholder="Descrição">
  <input id="valor" type="number" placeholder="Valor">

<br><br>

<button class="btn" onclick="salvar()">Salvar</button>

  <ul id="lista"></ul>

</div>

<script>

const supabase = supabase.createClient(
'https://pmgkatswiqmvecdovysx.supabase.co',
'sb_publishable_hy0h_dWAzVJQ9vjMA0mhPA_4Wr1_pDB'
)

let usuario = "Luã"

function setUser(nome){
  usuario = nome
  document.getElementById("btnLua").classList.remove("active")
  document.getElementById("btnMayara").classList.remove("active")

  if(nome==="Luã"){
    document.getElementById("btnLua").classList.add("active")
  } else {
    document.getElementById("btnMayara").classList.add("active")
  }
}

async function login(){
  const senha = document.getElementById("senha").value

  const { data } = await supabase
  .from("usuarios")
  .select("*")
  .eq("nome", usuario)
  .eq("senha", senha)

  if(data.length){
    document.getElementById("loginPage").style.display="none"
    document.getElementById("app").style.display="block"
    carregar()
  } else {
    alert("Senha incorreta")
  }
}

async function salvar(){
  const desc = document.getElementById("desc").value
  const valor = document.getElementById("valor").value

  await supabase.from("gastos").insert({
    usuario,
    descricao:desc,
    valor,
    data:new Date()
  })

  carregar()
}

async function carregar(){
  const { data } = await supabase.from("gastos").select("*")

  const lista = document.getElementById("lista")
  lista.innerHTML=""

  data.forEach(g=>{
    lista.innerHTML+=`<li>${g.descricao} - R$ ${g.valor}</li>`
  })
}

</script>

</body>
