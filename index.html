<body>

<div class="container" id="login">

  <div class="right">

  </div>
</div>

<div id="app" style="display:none;padding:20px;">
  <h1>Bem-vindo ao App 💰</h1>

  <input id="desc" placeholder="Descrição">
  <input id="valor" placeholder="Valor">

<button onclick="salvar()">Salvar gasto</button>

  <ul id="lista"></ul>
</div>

<script>
const supabase = window.supabase.createClient(
'https://pmgkatswiqmvecdovysx.supabase.co',
'sb_publishable_hy0h_dWAzVJQ9vjMA0mhPA_4Wr1_pDB'
)

let usuario = ""

async function login(){
  const nome = document.getElementById('user').value
  const senha = document.getElementById('senha').value

  const { data } = await supabase
    .from('usuarios')
    .select('*')
    .eq('nome', nome)
    .eq('senha', senha)

  if(data.length){
    usuario = nome
    document.getElementById('login').style.display='none'
    document.getElementById('app').style.display='block'
    carregar()
  } else {
    alert('Senha errada')
  }
}

async function salvar(){
  const desc = document.getElementById('desc').value
  const valor = document.getElementById('valor').value

  await supabase.from('gastos').insert({
    usuario: usuario,
    descricao: desc,
    categoria: 'Outros',
    tipo:'Avulso',
    valor: valor,
    data: new Date()
  })

  carregar()
}

async function carregar(){
  const { data } = await supabase.from('gastos').select('*')

  const lista = document.getElementById('lista')
  lista.innerHTML = ""

  data.forEach(g=>{
    lista.innerHTML += `<li>${g.descricao} - R$ ${g.valor}</li>`
  })
}
</script>

</body>
